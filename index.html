<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Statement Analyzer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 520px;
            width: 100%;
        }
        .logo { font-size: 28px; margin-bottom: 8px; }
        h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 6px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 6px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
        }
        .upload-area:hover { border-color: #6264a7; background: #f0f0ff; }
        .upload-area.has-file { border-color: #6264a7; background: #f0f0ff; }
        .upload-icon { font-size: 32px; margin-bottom: 8px; }
        .upload-text { font-size: 14px; color: #666; }
        .upload-text strong { color: #6264a7; }
        .file-name { font-size: 13px; color: #6264a7; font-weight: 600; margin-top: 8px; }
        #fileInput { display: none; }
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            background: white;
            cursor: pointer;
        }
        select:focus { outline: none; border-color: #6264a7; }
        button {
            width: 100%;
            padding: 12px;
            background: #6264a7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover:not(:disabled) { background: #4f5196; }
        button:disabled { background: #b0b0b0; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .status.info { background: #e8f0fe; color: #1a56db; display: block; }
        .status.success { background: #e6f4ea; color: #1e7e34; display: block; }
        .status.error { background: #fce8e8; color: #c0392b; display: block; }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .download-btn {
            background: #1e7e34;
            margin-top: 12px;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 15px;
        }
        .download-btn:hover { background: #155724; }
        .footer { margin-top: 28px; font-size: 12px; color: #aaa; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">📊</div>
    <h1>Bank Statement Analyzer</h1>
    <p class="subtitle">Upload a bank statement PDF and receive a portfolio summary Excel file.</p>

    <div class="field">
        <label>Bank Statement (PDF)</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📄</div>
            <div class="upload-text"><strong>Click to upload</strong> or drag and drop</div>
            <div class="upload-text">PDF files only</div>
            <div class="file-name" id="fileName"></div>
        </div>
        <input type="file" id="fileInput" accept=".pdf" />
    </div>

    <div class="field">
        <label>Base Currency</label>
        <select id="currency">
            <option value="CHF">CHF — Swiss Franc (default)</option>
            <option value="EUR">EUR — Euro</option>
            <option value="USD">USD — US Dollar</option>
        </select>
    </div>

    <button id="analyzeBtn" disabled onclick="analyze()">Analyze Statement</button>

    <div class="status" id="status"></div>

    <div class="footer">Data processed in Switzerland North · Powered by Azure AI Foundry</div>
</div>

<script>
    const FUNCTION_URL = "https://bank-analyzer-func-gcfcbjhye6guamh6.switzerlandnorth-01.azurewebsites.net/api/analyze_statement";

    const fileInput = document.getElementById("fileInput");
    const uploadArea = document.getElementById("uploadArea");
    const fileName = document.getElementById("fileName");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const status = document.getElementById("status");

    fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (file) {
            fileName.textContent = "✓ " + file.name;
            uploadArea.classList.add("has-file");
            analyzeBtn.disabled = false;
        }
    });

    uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = "#6264a7";
    });

    uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type === "application/pdf") {
            fileInput.files = e.dataTransfer.files;
            fileName.textContent = "✓ " + file.name;
            uploadArea.classList.add("has-file");
            analyzeBtn.disabled = false;
        }
    });

    async function analyze() {
        const file = fileInput.files[0];
        if (!file) return;

        const currency = document.getElementById("currency").value;

        analyzeBtn.disabled = true;
        analyzeBtn.textContent = "Analyzing...";
        showStatus("info", '<span class="spinner"></span>Analyzing your statement — this takes 1–3 minutes. Please wait.');

        const prev = document.getElementById("downloadLink");
        if (prev) prev.remove();

        try {
            const formData = new FormData();
            formData.append("pdf", file);

            const response = await fetch(
                `${FUNCTION_URL}?currency=${currency}`,
                { method: "POST", body: formData }
            );

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || `HTTP ${response.status}`);
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            const disposition = response.headers.get("Content-Disposition") || "";
            const match = disposition.match(/filename="(.+?)"/);
            const dlName = match ? match[1] : "Portfolio_Summary.xlsx";

            showStatus("success", "✓ Analysis complete. Your Excel file is ready.");

            const link = document.createElement("a");
            link.id = "downloadLink";
            link.href = url;
            link.download = dlName;
            link.className = "download-btn";
            link.textContent = "⬇ Download Portfolio Summary";
            status.after(link);

        } catch (err) {
            showStatus("error", "Error: " + err.message);
        } finally {
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = "Analyze Statement";
        }
    }

    function showStatus(type, message) {
        status.className = "status " + type;
        status.innerHTML = message;
    }
</script>
</body>
</html>
